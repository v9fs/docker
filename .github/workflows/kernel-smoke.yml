name: Kernel smoke test

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Docker"]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kernel-build:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'pull_request')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image built by Docker workflow
        env:
          IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE}"

      - name: Build Linux kernel inside image
        env:
          KERNEL_REF: v6.16
          IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          docker run --rm \
            --platform linux/arm64 \
            -e KERNEL_REF="${KERNEL_REF}" \
            "${IMAGE}" \
            sh -lc '
              set -euo pipefail
              mkdir -p /opt/v9fs/kernel
              cd /opt/v9fs/kernel
              git init -q
              git remote add origin https://github.com/torvalds/linux.git
              git fetch --depth 1 origin "${KERNEL_REF}"
              git checkout -q FETCH_HEAD
              make defconfig
              make -j"$(nproc)"
            '

