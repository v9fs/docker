name: Kernel smoke test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kernel-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build image (local load)
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: v9fs-kernel-smoke:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Linux kernel inside image
        env:
          KERNEL_REF: v6.16
        run: |
          set -euo pipefail
          docker run --rm \
            -e KERNEL_REF="${KERNEL_REF}" \
            v9fs-kernel-smoke:local \
            sh -lc '
              set -euo pipefail
              mkdir -p /opt/v9fs/kernel
              cd /opt/v9fs/kernel
              git init -q
              git remote add origin https://github.com/torvalds/linux.git
              git fetch --depth 1 origin "${KERNEL_REF}"
              git checkout -q FETCH_HEAD
              make defconfig
              make -j"$(nproc)"
            '

